<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>TECH+ Trivia Game</title>
    <link rel="stylesheet" href="../stylesheet.css">
    <style>
        .header {background-image: url('header.png');}
    </style>
</head>

<body>
    <header class="header" role="banner">
        <h1>TECH+ Trivia Game</h1>
        <!-- theme toggle -->
        <button id="theme-toggle" aria-label="Toggle light/dark theme" title="Toggle theme" style="position:absolute; top:1rem; right:1rem;">
            🌙
        </button>
    </header>

    <main role="main">
        <section class="row">
            <aside class="column side" aria-labelledby="score-label">
                <h2 id="score-label">Score</h2>
                <div id="scoreboard" aria-live="polite">0%</div>
            </aside>

            <section class="column middle">
                <h2 id="question">Loading...</h2>
                <div role="group" aria-labelledby="question">
                    <button class="answer-btn" aria-describedby="feedback"></button>
                    <button class="answer-btn" aria-describedby="feedback"></button>
                    <button class="answer-btn" aria-describedby="feedback"></button>
                    <button class="answer-btn" aria-describedby="feedback"></button>
                </div>
            </section>

            <aside class="column side" aria-labelledby="left-label">
                <h2 id="left-label">Questions Left</h2>
                <div id="leftquestions" aria-live="polite"></div>

                <div>
                    <h2>Elapsed Time</h2>
                    <div id="elapsedtime">0s</div>
                </div>
            </aside>
        </section>
    </main>

    <footer class="footer" role="contentinfo">
    </footer>

    <!-- modal overlay for feedback and next button -->
    <div id="modal-overlay" class="modal-overlay" role="dialog" aria-labelledby="modal-feedback">
        <div class="modal-content">
            <div id="feedback" aria-live="assertive" id="modal-feedback"></div>
            <div id="explanation" aria-live="polite"></div>
            <div class="modal-button-container">
                <button id="next-btn">Next Question</button>
            </div>
        </div>
    </div>
    
    <script src="techplus.js"></script>
    <script src="../game.js"></script>
</body>
</html>
